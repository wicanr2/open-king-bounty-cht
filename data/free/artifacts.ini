; Artifact definition file
; ========================
; Each section is called [artifactN], and has the following keys:
; name -- currently unused
; power -- selects artifact power. Can be one of:
;  'increased_damage', 'quarter_protection', 'double_leadership',
;  'increase_commission', 'double_spell_power', 'double_max_spells',
;  'cheaper_boat_rental' and 'unknown'.
; description -- specifies the text player gets when an artifact
;  is found. "\n" can be used to set newlines.
; invert_id -- controls the order artifacts appear on the map
;  (if changed, tileseta.png and tilesalt.png have to be adjusted
;   accrodingly).

[artifact0]
