; Artifact definition file
; ========================
; Each section is called [artifactN], and has the following keys:
; name -- currently unused
; power -- selects artifact power. Can be one of:
;  'increased_damage', 'quarter_protection', 'double_leadership',
;  'increase_commission', 'double_spell_power', 'double_max_spells',
;  'cheaper_boat_rental' and 'unknown'.
; description -- specifies the text player gets when an artifact
;  is found. "\n" can be used to set newlines.
; invert_id -- controls the order artifacts appear on the map
;  (if changed, tileseta.png and tilesalt.png have to be adjusted
;   accrodingly).

[artifact0]
name = 王者之劍
power = increased_damage
description = 你啃著殘羹冷飯,率領\n大軍深入遙遠而冷酷的\n異域。就在此地,你尋\n得了一柄附魔的寶劍……
invert_id = 7

[artifact1]
name = 護身盾牌
power = quarter_protection
description = 你與一名來路不明的術\n士立下契約,自此獲得\n更強的防護……
invert_id = 2

[artifact2]
name = 指揮王冠
power = double_leadership
description = 你在戰場上證明了自己\n的價值,贏得麾下將士\n的一致推崇……
invert_id = 4

[artifact3]
name = 貴族契約
power = increase_commission
description = 你身為一方領主的血統\n獲得確認。從此你可領\n取更豐厚的俸祿……
invert_id = 1

[artifact4]
name = 強力護身符
power = double_spell_power
description = 你從邪惡惡棍的魔掌中\n救出一名佳人,獲贈一\n件小小的謝禮……
invert_id = 6

[artifact5]
name = 英雄指環
power = unknown
description = 你在一處遠古寶藏中翻\n找,赫然發現一枚神祕\n的指環……
invert_id = 0

[artifact6]
name = 尼克羅斯之書
power = double_max_spells
description = 你在一間廢棄的小屋裡\n查探,發現一本名為\n《死靈之書》的典籍……
invert_id = 5

[artifact7]
name = 海權之錨
power = cheaper_boat_rental
description = 你掃蕩海上的險阻與海\n怪,尋得一只魔法之\n錨……
invert_id = 3
